name: Build & Release

on:
  workflow_dispatch: # manual trigger from GitHub UI
  push:
    tags: ['v*'] # keep for real releases

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Make (${{ matrix.platform }})
        run: pnpm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movesia-${{ matrix.platform }}
          path: out/make/**/*

      # Only publish to GitHub Releases when triggered by a tag
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
