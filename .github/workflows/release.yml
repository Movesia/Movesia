name: Build & Release

on:
  workflow_dispatch: # manual trigger from GitHub UI
  push:
    tags: ['v*'] # keep for real releases

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # Windows/Linux: run full make (Squirrel, DEB, RPM)
      - name: Make (${{ matrix.platform }})
        if: runner.os != 'macOS'
        run: pnpm run make

      # macOS: make ZIP only (appdmg native module doesn't compile in CI)
      - name: Make ZIP (${{ matrix.platform }})
        if: runner.os == 'macOS'
        run: pnpm exec electron-forge make --targets=@electron-forge/maker-zip

      # macOS: create DMG using create-dmg (pure shell, no native node modules)
      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Create DMG (${{ matrix.platform }})
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "Movesia" \
            --background "assets/dmgBackgroundImage.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Movesia.app" 150 200 \
            --app-drop-link 450 200 \
            "out/make/Movesia.dmg" \
            "out/Movesia-darwin-arm64/Movesia.app" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movesia-${{ matrix.platform }}
          path: out/make/**/*

      # Only publish to GitHub Releases when triggered by a tag
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
